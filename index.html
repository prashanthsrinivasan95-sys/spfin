function fmtTip(n){return new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}

function MiniBarChart({data, dataKey, colorFn, labelFn, height}) {
  height = height || 150;
  const [tip, setTip] = React.useState(null);
  if(!data||!data.length) return null;
  const vals = data.map(d=>d[dataKey]||0);
  const maxAbs = Math.max(...vals.map(Math.abs), 1);
  const W = 100, BAR_W = Math.min(18, (W/data.length)*0.6);
  const midY = height * 0.6;
  const scale = (midY - 24) / maxAbs;

  return e("div", {style:{position:"relative", width:"100%", height:height+"px"}},
    e("svg", {width:"100%", height:height, viewBox:"0 0 "+W+" "+height, preserveAspectRatio:"none"},
      // zero line
      e("line", {x1:0, y1:midY, x2:W, y2:midY, stroke:"#eee", strokeWidth:0.5}),
      // bars
      ...data.map((d, i) => {
        const val = d[dataKey] || 0;
        const clr = colorFn ? colorFn(val, d) : (val >= 0 ? "#16a34a" : "#dc2626");
        const barH = Math.abs(val) * scale;
        const x = (i / data.length) * W + (W/data.length - BAR_W)/2;
        const y = val >= 0 ? midY - barH : midY;
        return e("rect", {key:i, x:x, y:y, width:BAR_W, height:barH||1, fill:clr, rx:1,
          onMouseEnter:()=>setTip({d, i, x, clr}), onMouseLeave:()=>setTip(null), style:{cursor:"default"}});
      }),
      // labels on bars
      ...data.map((d, i) => {
        const val = d[dataKey] || 0;
        if(!val) return null;
        const clr = colorFn ? colorFn(val, d) : (val >= 0 ? "#16a34a" : "#dc2626");
        const barH = Math.abs(val) * scale;
        const x = (i / data.length) * W + (W/data.length)/2;
        const y = val >= 0 ? midY - barH - 2 : midY + barH + 8;
        const lbl = labelFn ? labelFn(val) : val;
        return e("text", {key:"l"+i, x:x, y:y, textAnchor:"middle", fontSize:5, fill:clr, fontWeight:600}, lbl);
      }),
      // x-axis labels
      ...data.map((d, i) => {
        const x = (i / data.length) * W + (W/data.length)/2;
        return e("text", {key:"x"+i, x:x, y:height-2, textAnchor:"middle", fontSize:5, fill:"#aaa"}, d.label);
      })
    ),
    // tooltip
    tip && e("div", {style:{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",background:"#fff",border:"1px solid #e8eaf0",borderRadius:8,padding:"8px 12px",fontSize:11,boxShadow:"0 4px 12px rgba(0,0,0,.1)",pointerEvents:"none",zIndex:10,whiteSpace:"nowrap",textAlign:"left"}},
      e("div", {style:{fontWeight:700,color:"#333",marginBottom:3}}, tip.d.label),
      tip.d.savings!==undefined && e("div", {style:{color:tip.d.savings>=0?"#16a34a":"#dc2626"}}, "Savings: "+fmtTip(tip.d.savings)),
      tip.d.variance!==undefined && e("div", {style:{color:tip.d.variance>=0?"#16a34a":"#dc2626"}}, "Variance: "+fmtTip(tip.d.variance)),
      tip.d.spend!==undefined && e("div", {style:{color:"#e07b54"}}, "Spend: "+fmtTip(tip.d.spend))
    )
  );
}

function BvaBarChart({data, height}) {
  height = height || 220;
  const [tip, setTip] = React.useState(null);
  if(!data||!data.length) return null;
  const maxVal = Math.max(...data.map(d=>Math.max(d.budget||0,d.actual||0)), 1);
  const PAD_L = 32, PAD_B = 55, PAD_T = 8, PAD_R = 8;
  const W = 500, H = height;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_B - PAD_T;
  const n = data.length;
  const slotW = chartW / n;
  const barW = Math.min(14, slotW * 0.35);
  const gap = 2;
  const scale = chartH / maxVal;

  // y axis ticks
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => ({
    val: maxVal * f,
    y: H - PAD_B - (maxVal * f * scale)
  }));

  function fmtY(v) {
    return v >= 100000 ? "₹"+(v/100000).toFixed(0)+"L" : v >= 1000 ? "₹"+(v/1000).toFixed(0)+"k" : "₹"+v;
  }

  return e("div", {style:{position:"relative", width:"100%"}},
    e("svg", {width:"100%", viewBox:"0 0 "+W+" "+H, style:{overflow:"visible"}},
      // y grid + labels
      ...yTicks.map((t,i) => [
        e("line", {key:"g"+i, x1:PAD_L, y1:t.y, x2:W-PAD_R, y2:t.y, stroke:"#f0f0f0", strokeWidth:0.8}),
        e("text", {key:"yt"+i, x:PAD_L-3, y:t.y+3, textAnchor:"end", fontSize:7, fill:"#bbb"}, fmtY(t.val))
      ]),
      // bars
      ...data.map((d, i) => {
        const cx = PAD_L + i * slotW + slotW/2;
        const bh = (d.budget||0) * scale;
        const ah = (d.actual||0) * scale;
        const over = d.actual > d.budget && d.budget > 0;
        return [
          e("rect", {key:"b"+i, x:cx - barW - gap/2, y:H-PAD_B-bh, width:barW, height:bh||1, fill:"#93c5fd", rx:2,
            onMouseEnter:()=>setTip({d,i}), onMouseLeave:()=>setTip(null), style:{cursor:"default"}}),
          e("rect", {key:"a"+i, x:cx + gap/2, y:H-PAD_B-ah, width:barW, height:ah||1, fill:over?"#dc2626":"#e07b54", rx:2,
            onMouseEnter:()=>setTip({d,i}), onMouseLeave:()=>setTip(null), style:{cursor:"default"}}),
          e("text", {key:"xl"+i, x:cx, y:H-PAD_B+8, textAnchor:"middle", fontSize:6.5, fill:"#888",
            transform:"rotate(-38,"+cx+","+(H-PAD_B+8)+")"}, d.name)
        ];
      }),
      // x axis line
      e("line", {x1:PAD_L, y1:H-PAD_B, x2:W-PAD_R, y2:H-PAD_B, stroke:"#eee", strokeWidth:1})
    ),
    // tooltip
    tip && e("div", {style:{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",background:"#fff",border:"1px solid #e8eaf0",borderRadius:8,padding:"8px 12px",fontSize:11,boxShadow:"0 4px 12px rgba(0,0,0,.1)",pointerEvents:"none",zIndex:10,whiteSpace:"nowrap"}},
      e("div",{style:{fontWeight:700,color:"#333",marginBottom:3}}, tip.d.fullName),
      e("div",{style:{color:"#2563eb"}}, "Budget: "+fmtTip(tip.d.budget)),
      e("div",{style:{color:"#e07b54"}}, "Actual: "+fmtTip(tip.d.actual)),
      (()=>{const diff=tip.d.budget-tip.d.actual; return e("div",{style:{color:diff>=0?"#16a34a":"#dc2626",fontWeight:600,marginTop:2}}, diff>=0?fmtTip(diff)+" under":fmtTip(Math.abs(diff))+" over");})()
    ),
    // legend
    e("div",{style:{display:"flex",gap:16,justifyContent:"center",marginTop:4}},
      e("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#666"}}, e("div",{style:{width:10,height:10,borderRadius:3,background:"#93c5fd"}}), "Budget"),
      e("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#666"}}, e("div",{style:{width:10,height:10,borderRadius:3,background:"#e07b54"}}), "Actual")
    )
  );
}

    async function load(){
      setLoading(true);

        const [tr,br,gr]=await Promise.all([
          sb.from("transactions").select("*").order("date",{ascending:false}),
          sb.from("budgets").select("*"),

          setBuds(bm);
        }
        setGoals((gr.data||[]).map(r2g));
        setSync("ok");
      }catch(ex){console.error(ex);setSync("error");}
      setLoading(false);
    }
    load();
  },[]);

  useEffect(()=>{
    const ch1=sb.channel("rt-t").on("postgres_changes",{event:"*",schema:"public",table:"transactions"},p=>{
      if(p.eventType==="INSERT")setTxns(prev=>{if(prev.find(t=>t.id===p.new.id))return prev;return[r2t(p.new),...prev];});
      else if(p.eventType==="UPDATE")setTxns(prev=>prev.map(t=>t.id===p.new.id?r2t(p.new):t));
      else if(p.eventType==="DELETE")setTxns(prev=>prev.filter(t=>t.id!==p.old.id));
    }).subscribe();
    const ch2=sb.channel("rt-b").on("postgres_changes",{event:"*",schema:"public",table:"budgets"},p=>{
      if(p.new)setBuds(prev=>({...prev,[p.new.category]:{amount:Number(p.new.amount),paidBy:p.new.paid_by}}));
    }).subscribe();
    const ch3=sb.channel("rt-g").on("postgres_changes",{event:"*",schema:"public",table:"goals"},p=>{
      if(p.eventType==="INSERT")setGoals(prev=>{if(prev.find(g=>g.id===p.new.id))return prev;return[...prev,r2g(p.new)];});
      else if(p.eventType==="UPDATE")setGoals(prev=>prev.map(g=>g.id===p.new.id?r2g(p.new):g));
      else if(p.eventType==="DELETE")setGoals(prev=>prev.filter(g=>g.id!==p.old.id));
    }).subscribe();
    return()=>{sb.removeChannel(ch1);sb.removeChannel(ch2);sb.removeChannel(ch3);};
  },[]);

  async function addT(f){const t={id:Date.now(),...f,amount:parseFloat(f.amount)};setTxns(p=>[t,...p]);setSync("syncing");const{error}=await sb.from("transactions").insert(t2r(t));setSync(error?"error":"ok");}

  async function delT(id){setTxns(p=>p.filter(t=>t.id!==id));setSync("syncing");const{error}=await sb.from("transactions").delete().eq("id",id);setSync(error?"error":"ok");}

                over&&div({key:"over",style:{marginTop:4,fontSize:11,color:"#dc2626"}},"⚠ Over by "+fmt(sp-bgt))
              ]
            );
          })
        )
      ),

      // ── Goals ──
      view==="goals"&&div({style:{display:"grid",gap:16}},
        div({style:{display:"flex",justifyContent:"flex-end"}},
          btn({onClick:()=>{setGform({name:"",target:"",saved:""});setEgid(null);setShowG(true);},style:{background:"#e07b54",color:"#fff",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600}},"+ New Goal")
        ),
        goals.length===0?div({style:{background:"#fff",borderRadius:16,border:"1px solid #e8eaf0",padding:48,textAlign:"center",color:"#ccc"}},"No goals yet."):
        div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}},
          ...goals.map(g=>{const p=Math.min((g.saved/g.target)*100,100),done=p>=100;return div({key:g.id,style:{background:"#fff",borderRadius:16,border:"1px solid #e8eaf0",padding:"20px"}},
            div({style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
              div({style:{fontWeight:700,fontSize:16,color:"#222"}},g.name),
              div({style:{display:"flex",gap:2}},
                btn({onClick:()=>{setGform({name:g.name,target:g.target,saved:g.saved});setEgid(g.id);setShowG(true);},style:{background:"transparent",borderRadius:7,padding:"5px 8px",fontSize:13,color:"#999"}},"✎"),
                btn({onClick:()=>delG(g.id),style:{background:"transparent",borderRadius:7,padding:"5px 8px",fontSize:13,color:"#e07b54"}},"✕")
              )
            ),
            div({style:{fontFamily:"Arial",fontWeight:700,fontSize:26,color:done?"#16a34a":"#d97706",marginBottom:3}},p.toFixed(0)+"%"),
            div({style:{fontSize:12,color:"#aaa",marginBottom:12}},fmt(g.saved)+" of "+fmt(g.target)),
            div({style:{height:9,background:"#eef0f5",borderRadius:100,overflow:"hidden"}},div({style:{height:"100%",borderRadius:100,width:p+"%",background:done?"#16a34a":"#e8b84b"}})),
            done?div({style:{marginTop:8,fontSize:13,color:"#16a34a"}},"🎉 Goal achieved!"):div({style:{marginTop:8,fontSize:12,color:"#aaa"}},fmt(g.target-g.saved)+" to go")
          );})
        )
      )
    ),

    // ── Add/Edit Transaction Modal ──
    showT&&div({onClick:ev=>{if(ev.target===ev.currentTarget)setShowT(false);},style:{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}},
      div({style:{background:"#fff",borderRadius:20,padding:28,width:"100%",maxWidth:460,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.12)"}},
        div({style:{fontWeight:800,fontSize:20,marginBottom:20,color:"#1a1a2e"}},eid?"Edit Transaction":"Add Transaction"),
        div({style:{display:"grid",gap:14}},
          // type
          div(null,
            div({style:{fontSize:11,color:"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}},"Type"),
            div({style:{display:"flex",gap:8}},
              ...["expense","income"].map(t=>btn({key:t,onClick:()=>setForm(f=>({...f,type:t})),style:{flex:1,padding:"9px",borderRadius:10,border:"1px solid "+(form.type===t?(t==="income"?"#16a34a":"#e07b54"):"#dde0e8"),background:form.type===t?(t==="income"?"rgba(22,163,74,.08)":"rgba(224,123,84,.08)"):"transparent",color:form.type===t?(t==="income"?"#16a34a":"#e07b54"):"#aaa",fontWeight:600,fontSize:13,textTransform:"capitalize"}},t))
            )
          ),
          // date, amount, description
          ...[["Date","date","date"],["Amount (₹)","amount","number"],["Description","description","text"]].map(([lbl,key,type])=>
            div({key},
              div({style:{fontSize:11,color:"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}},lbl),
              inp({type,value:form[key],placeholder:key==="amount"?"0":"e.g. Swiggy, bills…",onChange:ev=>setForm(f=>({...f,[key]:ev.target.value})),style:{background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:10,padding:"10px 14px",color:"#1a1a2e",fontSize:14,width:"100%"}})
            )
          ),
          // category
          div(null,
            div({style:{fontSize:11,color:"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}},"Category"),
            e("select",{value:form.category,onChange:ev=>setForm(f=>({...f,category:ev.target.value})),style:{background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:10,padding:"10px 14px",color:"#1a1a2e",fontSize:14,width:"100%"}},
              ...CATS.map(c=>e("option",{key:c,value:c},c))
            )
          ),
          // spent by
          div(null,
            div({style:{fontSize:11,color:"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}},"Spent by"),
            div({style:{display:"flex",gap:8}},
              ...SBY.map(s=>btn({key:s,onClick:()=>setForm(f=>({...f,spentBy:s})),style:{flex:1,padding:"9px",borderRadius:10,border:"1px solid "+(form.spentBy===s?SBC[s]:"#dde0e8"),background:form.spentBy===s?SBC[s]+"10":"transparent",color:form.spentBy===s?SBC[s]:"#aaa",fontWeight:700,fontSize:13}},s))
            )
          ),
          div({style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}},
            btn({onClick:()=>setShowT(false),style:{background:"transparent",color:"#aaa",borderRadius:8,padding:"5px 10px",fontSize:13}},"Cancel"),
            btn({onClick:()=>{if(!form.amount||isNaN(form.amount))return;if(eid){updT(eid,form);}else{addT(form);}setForm(EF);setEid(null);setShowT(false);},style:{background:"#e07b54",color:"#fff",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600}},eid?"Save Changes":"Add Transaction")
          )
        )
      )
    ),

    // ── Add/Edit Goal Modal ──
    showG&&div({onClick:ev=>{if(ev.target===ev.currentTarget)setShowG(false);},style:{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}},
      div({style:{background:"#fff",borderRadius:20,padding:28,width:"100%",maxWidth:460,boxShadow:"0 8px 40px rgba(0,0,0,.12)"}},
        div({style:{fontWeight:800,fontSize:20,marginBottom:20,color:"#1a1a2e"}},egid?"Edit Goal":"New Goal"),
        div({style:{display:"grid",gap:14}},
          ...[["Goal Name","name","text"],["Target (₹)","target","number"],["Saved so far (₹)","saved","number"]].map(([lbl,key,type])=>
            div({key},
              div({style:{fontSize:11,color:"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}},lbl),
              inp({type,value:gform[key],placeholder:key==="name"?"e.g. Emergency Fund":"0",onChange:ev=>setGform(f=>({...f,[key]:ev.target.value})),style:{background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:10,padding:"10px 14px",color:"#1a1a2e",fontSize:14,width:"100%"}})
            )
          ),
          div({style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}},
            btn({onClick:()=>setShowG(false),style:{background:"transparent",color:"#aaa",borderRadius:8,padding:"5px 10px",fontSize:13}},"Cancel"),
            btn({onClick:()=>{if(!gform.name||!gform.target)return;if(egid){updG(egid,gform);}else{addG(gform);}setGform({name:"",target:"",saved:""});setEgid(null);setShowG(false);},style:{background:"#e07b54",color:"#fff",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600}},egid?"Save":"Create Goal")
          )
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App,null));

  } catch(err) {
    document.getElementById('root').innerHTML='<div style="padding:40px;color:red;font-family:monospace;white-space:pre-wrap"><b>Error:</b> '+err.message+'<br><br>'+err.stack+'</div>';
  }
});
  } catch(err) {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:monospace;white-space:pre-wrap"><b>App Error:</b>\n' + err.message + '\n' + (err.stack||'') + '</div>';
  }
})();
</script>
</body>
</html>
