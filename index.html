function setState(patch) {

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n){return new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
function fmtS(n){const a=Math.abs(n),s=n<0?"-":"";return a>=100000?s+"₹"+(a/100000).toFixed(1)+"L":a>=1000?s+"₹"+(a/1000).toFixed(0)+"k":s+"₹"+a;}
function gm(d){return d?d.slice(0,7):"";}
function mlabel(m){return new Date(m+"-01").toLocaleString("default",{month:"short",year:"2-digit"});}
function tok(t,f){if(f==="All")return true;if(f==="PS")return t.spentBy==="PS"||t.spentBy==="Both";return t.spentBy==="SN"||t.spentBy==="Both";}
function bok(p,f){if(f==="All")return true;if(f==="PS")return p==="PS"||p==="Both";return p==="SN"||p==="Both";}
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else if(k==='htmlFor'){el.htmlFor=v;}
    else if(v!==null&&v!==undefined&&v!==false){el.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}
function div(a,...c){return h('div',a,...c);}
function span(a,...c){return h('span',a,...c);}
function btn(a,...c){return h('button',a,...c);}
function inp(a){return h('input',a);}
function svg(vb,w,hh,...c){const s=document.createElementNS("http://www.w3.org/2000/svg","svg");s.setAttribute("viewBox",vb);s.setAttribute("width",w);s.setAttribute("height",hh);s.setAttribute("preserveAspectRatio","none");c.forEach(el=>s.appendChild(el));return s;}
function svgEl(tag,attrs){const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}

// ── Computed ──────────────────────────────────────────────────────────────────
function getComputed(){
  const {txns,budgets,month,person,goals}=state;
  const mTxns=txns.filter(t=>gm(t.date)===month&&tok(t,person));
  const income=mTxns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=mTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const budgeted=CATS.filter(c=>bok(budgets[c]?.paidBy,person)).reduce((s,c)=>s+(budgets[c]?.amount||0),0);
  const variance=budgeted-expense;
  const spcat={};
  mTxns.filter(t=>t.type==="expense").forEach(t=>{spcat[t.category]=(spcat[t.category]||0)+t.amount;});

  // trend from 2026-01 to current month
  const tmonths=[];
  let [y,m2]=[2026,1];
  const [ey,em]=month.split("-").map(Number);
  while(y<ey||(y===ey&&m2<=em)){
    tmonths.push(y+"-"+String(m2).padStart(2,"0"));
    m2++;if(m2>12){m2=1;y++;}
  }
  let cs=0,cv=0,csp=0;
  const trend=tmonths.map(mo=>{
    const mt=txns.filter(t=>gm(t.date)===mo&&tok(t,person));
    const inc=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const bgt=CATS.filter(c=>bok(budgets[c]?.paidBy,person)).reduce((s,c)=>s+(budgets[c]?.amount||0),0);
    cs+=(inc-exp);cv+=(bgt-exp);csp+=exp;
    return{label:mlabel(mo),savings:inc-exp,variance:bgt-exp,spend:exp,cs,cv,csp};
  });

  const bva=CATS.filter(c=>bok(budgets[c]?.paidBy,person))
    .map(c=>({name:c.length>13?c.slice(0,12)+"…":c,fullName:c,budget:budgets[c]?.amount||0,actual:spcat[c]||0,paidBy:budgets[c]?.paidBy||"Both",color:COLORS[CATS.indexOf(c)]}))
    .filter(d=>d.budget>0||d.actual>0).sort((a,b)=>b.budget-a.budget);

  const fTxns=txns.filter(t=>gm(t.date)===month&&tok(t,person)).sort((a,b)=>b.date.localeCompare(a.date));
  const selLabel=new Date(month+"-01").toLocaleString("default",{month:"long",year:"numeric"});
  return{mTxns,income,expense,budgeted,variance,spcat,trend,bva,fTxns,selLabel,goals};
}

// ── Mini bar chart (pure SVG) ─────────────────────────────────────────────────
function miniChart(data, dataKey, colorFn, height){
  height=height||140;
  if(!data||!data.length)return div({});
  const vals=data.map(d=>d[dataKey]||0);
  const maxAbs=Math.max(...vals.map(Math.abs),1);
  const W=300,n=data.length,bw=Math.min(28,(W/n)*0.55),gap=W/n;
  const midY=height*0.58,scale=(midY-28)/maxAbs;
  const svgEl2=(tag,attrs,txt)=>{const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));if(txt!==undefined)el.textContent=txt;return el;};
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox","0 0 "+W+" "+height);
  s.setAttribute("width","100%");
  s.setAttribute("height",height);
  s.setAttribute("preserveAspectRatio","xMidYMid meet");
  // zero line
  s.appendChild(svgEl2("line",{x1:0,y1:midY,x2:W,y2:midY,stroke:"#e8eaf0","stroke-width":"1"}));
  data.forEach((d,i)=>{
    const val=d[dataKey]||0;
    const clr=colorFn?colorFn(val):(val>=0?"#16a34a":"#dc2626");
    const x=gap*i+gap/2-bw/2;
    const barH=Math.abs(val)*scale;
    const y=val>=0?midY-barH:midY;
    const rect=svgEl2("rect",{x,y,width:bw,height:Math.max(barH,1),fill:clr,rx:3});
    s.appendChild(rect);
    // label on top
    if(Math.abs(val)>0){
      const ly=val>=0?y-3:y+barH+10;
      // white bg rect for readability
      const tw = 28, th2 = 12;
      const tx2 = x+bw/2 - tw/2;
      const ty2 = val>=0 ? ly-11 : ly-1;
      const bg = svgEl2("rect",{x:tx2,y:ty2,width:tw,height:th2,fill:"white",rx:2,"fill-opacity":"0.85"});
      s.appendChild(bg);
      s.appendChild(svgEl2("text",{x:x+bw/2,y:ly,"text-anchor":"middle","font-size":"12","fill":clr,"font-weight":"700","font-family":"system-ui,sans-serif"},fmtS(val)));
    }
    // x label
    s.appendChild(svgEl2("text",{x:x+bw/2,y:height-2,"text-anchor":"middle","font-size":"11","fill":"#555","font-weight":"600","font-family":"system-ui,sans-serif"},d.label));
  });
  return div({style:{width:"100%",overflow:"hidden"}},s);
}

// ── BvA bar chart ─────────────────────────────────────────────────────────────
function bvaChart(data, height){
  height=height||220;
  if(!data||!data.length)return div({});
  const maxVal=Math.max(...data.map(d=>Math.max(d.budget,d.actual)),1);
  const W=700,n=data.length,grpW=(W-20)/n,bw=Math.min(12,grpW*0.22),labelH=55;
  const chartH=height-labelH;
  const scale=(chartH-20)/maxVal;
  const svgEl2=(tag,attrs,txt)=>{const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));if(txt!==undefined)el.textContent=txt;return el;};
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox","0 0 "+W+" "+height);
  s.setAttribute("width","100%");
  s.setAttribute("height",height);
  s.setAttribute("preserveAspectRatio","xMidYMid meet");
  data.forEach((d,i)=>{
    const cx=10+grpW*i+grpW/2;
    // budget bar
    const bh=Math.max(d.budget*scale,1);
    s.appendChild(svgEl2("rect",{x:cx-bw-1,y:chartH-bh,width:bw,height:bh,fill:"#93c5fd",rx:3}));
    // actual bar
    const ah=Math.max(d.actual*scale,1);
    s.appendChild(svgEl2("rect",{x:cx+1,y:chartH-ah,width:bw,height:ah,fill:"#e07b54",rx:3}));
    // x label
    const lx=cx;
    const labelEl=svgEl2("text",{x:lx,y:chartH+10,"text-anchor":"end","font-size":"8.5","fill":"#888","transform":"rotate(-40,"+lx+","+(chartH+10)+")"},d.name);
    s.appendChild(labelEl);
  });
  // legend
  const leg=div({style:{display:"flex",gap:16,justifyContent:"center",marginTop:4}});
  [["#93c5fd","Budget"],["#e07b54","Actual"]].forEach(([c,l])=>{
    leg.appendChild(div({style:{display:"flex",alignItems:"center",gap:4,fontSize:"10px",color:"#999"}},
      div({style:{width:"10px",height:"10px",borderRadius:"3px",background:c}}),
      l
    ));
  });
  const wrap=div({style:{width:"100%",overflowX:"auto"}});
  wrap.appendChild(s);
  wrap.appendChild(leg);
  return wrap;
}

// ── Filter bar ────────────────────────────────────────────────────────────────
function filterBar(){
  const {month,person}=state;
  const pLabel=person==="All"?"All expenses":person+" + shared";
  const bar=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}});
  const left=div({style:{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}});
  // month picker
  const mp=div({style:{display:"flex",alignItems:"center",gap:8}});
  mp.appendChild(span({style:{fontSize:"11px",color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}},"Month"));
  const mi=inp({type:"month",value:month,min:"2026-01",style:{background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:"10px",padding:"6px 12px",color:"#1a1a2e"}});
  mi.addEventListener('change',e=>setState({month:e.target.value}));
  mp.appendChild(mi);
  left.appendChild(mp);
  // person filter
  const pf=div({style:{display:"flex",gap:6,alignItems:"center"}});
  pf.appendChild(span({style:{fontSize:"11px",color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}},"View"));
  ["All","PS","SN"].forEach(f=>{
    const b=btn({className:"pill-btn"+(person===f?" active":""),onClick:()=>setState({person:f})},f);
    pf.appendChild(b);
  });
  left.appendChild(pf);
  left.appendChild(span({style:{fontSize:"12px",color:"#aaa",fontStyle:"italic"}},pLabel));
  bar.appendChild(left);
  bar.appendChild(span({style:{fontSize:"11px",color:"#8b5cf6",fontWeight:600,background:"#f5f3ff",padding:"4px 10px",borderRadius:"20px"}},"⬡ Preview"));
  return bar;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(c){
  const {income,expense,budgeted,variance,trend,bva,selLabel,goals}=c;
  const {month,person}=state;
  const wrap=div({style:{display:"grid",gap:16}});
  wrap.appendChild(filterBar());

  // summary cards
  const cards=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}});
  [{label:"Total Income",val:income,color:"#16a34a",icon:"↑"},
   {label:"Budgeted Expenses",val:budgeted,color:"#2563eb",icon:"◫"},
   {label:"Actual Expenses",val:expense,color:expense>budgeted?"#dc2626":"#e07b54",icon:"↓"}
  ].forEach(card=>{
    const el=div({className:"card",style:{padding:"20px 24px",display:"flex",alignItems:"center",gap:16}});

// ── Transaction Modal ─────────────────────────────────────────────────────────
function txnModal(){
  const {txnForm,editTxnId}=state;
  const overlay=div({className:"modal-overlay"});
  overlay.addEventListener('click',e=>{if(e.target===overlay)setState({showTxnModal:false,editTxnId:null});});
  const modal=div({className:"modal"});
  modal.appendChild(div({style:{fontWeight:800,fontSize:"20px",marginBottom:"20px",color:"#1a1a2e"}},editTxnId?"Edit Transaction":"Add Transaction"));
  const form=div({style:{display:"grid",gap:14}});

  // type
  const typeRow=div({});
  typeRow.appendChild(h("label",{className:"form-label"},"Type"));
  const typeBtns=div({style:{display:"flex",gap:"8px"}});
  ["expense","income"].forEach(t=>{
    const b=btn({style:{flex:1,padding:"9px",borderRadius:"10px",border:"1px solid "+(txnForm.type===t?(t==="income"?"#16a34a":"#e07b54"):"#dde0e8"),background:txnForm.type===t?(t==="income"?"rgba(22,163,74,.08)":"rgba(224,123,84,.08)"):"transparent",color:txnForm.type===t?(t==="income"?"#16a34a":"#e07b54"):"#aaa",fontWeight:600,fontSize:"13px",textTransform:"capitalize"}},t);
    b.addEventListener('click',()=>{
      Object.assign(txnForm,{type:t,category:t==="income"?"Income":CATS[0]});
      setState({txnForm:{...txnForm}});
    });
    typeBtns.appendChild(b);
  });
  typeRow.appendChild(typeBtns);
  form.appendChild(typeRow);

  // date, amount, description
  [["Date","date","date"],["Amount (₹)","amount","number"],["Description","description","text"]].forEach(([lbl,key,type])=>{
    const row=div({});
    row.appendChild(h("label",{className:"form-label"},lbl));
    const i=inp({type,value:txnForm[key]||"",placeholder:key==="amount"?"0":"e.g. Swiggy, bills…",className:"form-input"});
    i.addEventListener('input',e=>{Object.assign(txnForm,{[key]:e.target.value});});
    row.appendChild(i);
    form.appendChild(row);
  });

  // category - only show for expenses
  if(txnForm.type!=="income"){
    const catRow=div({});
    catRow.appendChild(h("label",{className:"form-label"},"Category"));
    const sel=h("select",{className:"form-input"});
    CATS.forEach(c=>{const o=h("option",{value:c},c);if(c===txnForm.category)o.selected=true;sel.appendChild(o);});
    sel.addEventListener('change',e=>{Object.assign(txnForm,{category:e.target.value});});
    catRow.appendChild(sel);
    form.appendChild(catRow);
  }

  // spent by
  const sbyRow=div({});
  sbyRow.appendChild(h("label",{className:"form-label"},"Spent by"));
  const sbyBtns=div({style:{display:"flex",gap:"8px"}});
  SBY.forEach(s=>{
    const b=btn({style:{flex:1,padding:"9px",borderRadius:"10px",border:"1px solid "+(txnForm.spentBy===s?SBC[s]:"#dde0e8"),background:txnForm.spentBy===s?SBC[s]+"10":"transparent",color:txnForm.spentBy===s?SBC[s]:"#aaa",fontWeight:700,fontSize:"13px"}},s);
    b.addEventListener('click',()=>{Object.assign(txnForm,{spentBy:s});setState({txnForm:{...txnForm}});});
    sbyBtns.appendChild(b);
  });
  sbyRow.appendChild(sbyBtns);
  form.appendChild(sbyRow);

  // buttons
  const btns=div({style:{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"4px"}});
  const cancel=btn({style:{background:"transparent",color:"#aaa",borderRadius:"8px",padding:"5px 10px",fontSize:"13px"}},"Cancel");
  cancel.addEventListener('click',()=>setState({showTxnModal:false,editTxnId:null}));
  const save=btn({style:{background:"#e07b54",color:"#fff",borderRadius:"10px",padding:"10px 20px",fontSize:"14px",fontWeight:600}},editTxnId?"Save Changes":"Add Transaction");
  save.addEventListener('click',()=>{
    if(!txnForm.amount||isNaN(txnForm.amount))return;
    const t={...txnForm,amount:parseFloat(txnForm.amount)};
    if(editTxnId){
      setState(s=>({txns:s.txns.map(x=>x.id===editTxnId?{...x,...t}:x),showTxnModal:false,editTxnId:null}));
    } else {
      setState(s=>({txns:[{id:Date.now(),...t},...s.txns],showTxnModal:false}));
    }
  });
  btns.appendChild(cancel);btns.appendChild(save);
  form.appendChild(btns);
  modal.appendChild(form);
  overlay.appendChild(modal);
  return overlay;
}

    form.appendChild(row);
  });
  const btns=div({style:{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"4px"}});
  const cancel=btn({style:{background:"transparent",color:"#aaa",borderRadius:"8px",padding:"5px 10px",fontSize:"13px"}},"Cancel");
  cancel.addEventListener('click',()=>setState({showGoalModal:false,editGoalId:null}));
  const save=btn({style:{background:"#e07b54",color:"#fff",borderRadius:"10px",padding:"10px 20px",fontSize:"14px",fontWeight:600}},editGoalId?"Save":"Create Goal");
  save.addEventListener('click',()=>{
    if(!goalForm.name||!goalForm.target)return;
    const g={name:goalForm.name,target:parseFloat(goalForm.target),saved:parseFloat(goalForm.saved||0)};
    if(editGoalId){
      setState(s=>({goals:s.goals.map(x=>x.id===editGoalId?{...x,...g}:x),showGoalModal:false,editGoalId:null}));
    } else {
      setState(s=>({goals:[...s.goals,{id:Date.now(),...g}],showGoalModal:false}));
    }
  });
  btns.appendChild(cancel);btns.appendChild(save);
  form.appendChild(btns);
  modal.appendChild(form);
  overlay.appendChild(modal);
  return overlay;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const c=getComputed();

  // Header
  const header=h("header",{style:{padding:"12px 24px",borderBottom:"1px solid #e8eaf0",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#fff",zIndex:50,boxShadow:"0 1px 6px rgba(0,0,0,.05)"}});
  // Logo
  const logo=div({style:{display:"flex",alignItems:"center",gap:10}});
  logo.appendChild(div({style:{width:"38px",height:"38px",borderRadius:"10px",background:"linear-gradient(135deg,#e07b54,#e8b84b)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(224,123,84,.35)"}},
    (() => {
      const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
      s.setAttribute("width","22");s.setAttribute("height","22");s.setAttribute("viewBox","0 0 22 22");s.setAttribute("fill","none");
      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d","M3 16 L7 10 L11 13 L15 6 L19 9");p.setAttribute("stroke","#fff");p.setAttribute("stroke-width","2.2");p.setAttribute("stroke-linecap","round");p.setAttribute("stroke-linejoin","round");
      s.appendChild(p);
      const ci=document.createElementNS("http://www.w3.org/2000/svg","circle");
      ci.setAttribute("cx","19");ci.setAttribute("cy","9");ci.setAttribute("r","1.8");ci.setAttribute("fill","#fff");
      s.appendChild(ci);return s;
    })()
  ));
  const logoText=div({});
  const lt=div({style:{fontSize:"20px",fontWeight:800,color:"#1a1a2e",lineHeight:1}});
  lt.textContent="S";
  const amp=span({style:{color:"#e07b54"}},"&");
  lt.appendChild(amp);
  lt.appendChild(document.createTextNode("P"));
  logoText.appendChild(lt);
  logoText.appendChild(div({style:{fontSize:"9px",color:"#bbb",letterSpacing:".1em",textTransform:"uppercase"}},"Personal Finance"));
  logo.appendChild(logoText);
  header.appendChild(logo);
  // Nav
  const nav=h("nav",{style:{display:"flex",gap:3}});
  [{id:"dashboard",label:"Dashboard",icon:"▦"},{id:"transactions",label:"Transactions",icon:"↕"},{id:"budgets",label:"Budgets",icon:"◫"},{id:"goals",label:"Goals",icon:"◎"}].forEach(n=>{
    const b=btn({className:"nav-btn"+(state.view===n.id?" active":"")},n.icon+" "+n.label);
    b.addEventListener('click',()=>setState({view:n.id}));
    nav.appendChild(b);
  });
  header.appendChild(nav);
  // Add btn
  const addBtn=btn({style:{background:"#e07b54",color:"#fff",borderRadius:"10px",padding:"10px 20px",fontSize:"14px",fontWeight:600}},"+ Add Transaction");
  addBtn.addEventListener('click',()=>setState({showTxnModal:true,editTxnId:null,txnForm:{type:"expense",amount:"",category:CATS[0],description:"",date:new Date().toISOString().slice(0,10),spentBy:"PS"}}));
  header.appendChild(addBtn);
  app.appendChild(header);

  // Main content
  const main=h("main",{style:{padding:"20px 24px",maxWidth:"1400px",margin:"0 auto"}});
  if(state.view==="dashboard") main.appendChild(renderDashboard(c));
  else if(state.view==="transactions") main.appendChild(renderTransactions(c));
  else if(state.view==="budgets") main.appendChild(renderBudgets(c));
  else if(state.view==="goals") main.appendChild(renderGoals());
  app.appendChild(main);

  // Modals
  if(state.showTxnModal) app.appendChild(txnModal());
  if(state.showGoalModal) app.appendChild(goalModal());
}

render();
</script>
