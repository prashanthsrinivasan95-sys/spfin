<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>S&P Personal Finance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fb;color:#1a1a2e;font-size:14px}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px}
input,select{font-family:inherit;font-size:13px;outline:none}
table{border-collapse:collapse;width:100%}
th,td{text-align:left}
.nav-btn{padding:9px 14px;border-radius:10px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:7px;background:transparent;color:#888}
.nav-btn.active{background:#e07b54;color:#fff}
.card{background:#fff;border-radius:16px;border:1px solid #e8eaf0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill-btn{padding:6px 18px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #dde0e8;background:transparent;color:#888}
.pill-btn.active{border-color:#e07b54;background:rgba(224,123,84,.08);color:#e07b54}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.form-label{font-size:11px;color:#888;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;display:block}
.form-input{background:#f8f9fb;border:1px solid #dde0e8;border-radius:10px;padding:10px 14px;color:#1a1a2e;width:100%}
.progress-bar{height:7px;background:#eef0f5;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
tbody tr:hover td{background:#fafafa}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const CATS=["Rent","Sambhar stories","Health/medical","EB","Recreation","Fuel","Food order","Groceries","Gifts","Debt","Travel","PS discretionary","SN discretionary","Philanthropy","Cook and maid","Home miscellaneous","Mobile/internet/OTT"];
const COLORS=["#e07b54","#e8b84b","#5ba4a4","#a78bfa","#f472b6","#34d399","#60a5fa","#94a3b8","#fb923c","#c084fc","#2dd4bf","#f87171","#86efac","#d97706","#67e8f9","#84cc16","#e879f9"];
const DEFPAIDBY={"Rent":"Both","Sambhar stories":"Both","Health/medical":"Both","EB":"Both","Recreation":"Both","Fuel":"Both","Food order":"Both","Groceries":"Both","Gifts":"Both","Debt":"Both","Travel":"Both","PS discretionary":"PS","SN discretionary":"SN","Philanthropy":"Both","Cook and maid":"Both","Home miscellaneous":"Both","Mobile/internet/OTT":"Both"};
const BUDGETS={};
const SEED=[];
const SBY=["PS","SN","Both"];
const SBC={PS:"#7c3aed",SN:"#db2777",Both:"#2563eb"};
const defBudgets=Object.fromEntries(CATS.map(c=>[c,{amount:BUDGETS[c]||0,paidBy:DEFPAIDBY[c]||"Both"}]));

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  txns: [],
  budgets: JSON.parse(JSON.stringify(defBudgets)),
  goals: [],
  loading: true,
  authed: sessionStorage.getItem("snp_auth") === "1",
  monthlyBudgets: {},  // {month: {cat: {amount, paidBy}}}
  showBudgetModal: false,
  editBudgetCat: null,  // null=add, string=edit
  view: 'dashboard',
  month: '2026-03',
  person: 'All',
  showTxnModal: false,
  showGoalModal: false,
  editTxnId: null,
  editGoalId: null,
  txnForm: {type:'expense',amount:'',category:CATS[0],description:'',date:new Date().toISOString().slice(0,10),spentBy:'PS'},
  goalForm: {name:'',target:'',saved:''},
};

function setState(patch) {
  Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n){return new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
function fmtS(n){const a=Math.abs(n),s=n<0?"-":"";return a>=100000?s+"₹"+(a/100000).toFixed(1)+"L":a>=1000?s+"₹"+(a/1000).toFixed(0)+"k":s+"₹"+a;}
function gm(d){return d?d.slice(0,7):"";}
function mlabel(m){return new Date(m+"-01").toLocaleString("default",{month:"short",year:"2-digit"});}
function tok(t,f){if(f==="All")return true;if(f==="PS")return t.spentBy==="PS"||t.spentBy==="Both";return t.spentBy==="SN"||t.spentBy==="Both";}
function bok(p,f){if(f==="All")return true;if(f==="PS")return p==="PS"||p==="Both";return p==="SN"||p==="Both";}
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else if(k==='htmlFor'){el.htmlFor=v;}
    else if(v!==null&&v!==undefined&&v!==false){el.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}
function div(a,...c){return h('div',a,...c);}
function span(a,...c){return h('span',a,...c);}
function btn(a,...c){return h('button',a,...c);}
function inp(a){return h('input',a);}
function svg(vb,w,hh,...c){const s=document.createElementNS("http://www.w3.org/2000/svg","svg");s.setAttribute("viewBox",vb);s.setAttribute("width",w);s.setAttribute("height",hh);s.setAttribute("preserveAspectRatio","none");c.forEach(el=>s.appendChild(el));return s;}
function svgEl(tag,attrs){const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}

// ── Computed ──────────────────────────────────────────────────────────────────
function getComputed(){
  const {txns,month,person,goals}=state;
  // Use archived monthly budget for the selected month if it exists, else current budget
  const budgets = budgetForMonth(month);
  const mTxns=txns.filter(t=>gm(t.date)===month&&tok(t,person));
  const income=mTxns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=mTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const budgeted=Object.entries(budgets).filter(([c,b])=>bok(b.paidBy,person)).reduce((s,[c,b])=>s+(b.amount||0),0);
  const variance=budgeted-expense;
  const spcat={};
  mTxns.filter(t=>t.type==="expense").forEach(t=>{spcat[t.category]=(spcat[t.category]||0)+t.amount;});

  // trend from 2026-01 to current month
  const tmonths=[];
  let [y,m2]=[2026,1];
  const [ey,em]=month.split("-").map(Number);
  while(y<ey||(y===ey&&m2<=em)){
    tmonths.push(y+"-"+String(m2).padStart(2,"0"));
    m2++;if(m2>12){m2=1;y++;}
  }
  let cs=0,cv=0,csp=0;
  const trend=tmonths.map(mo=>{
    const mt=txns.filter(t=>gm(t.date)===mo&&tok(t,person));
    const inc=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const moBudgets=budgetForMonth(mo); const bgt=Object.entries(moBudgets).filter(([c,b])=>bok(b.paidBy,person)).reduce((s,[c,b])=>s+(b.amount||0),0);
    cs+=(inc-exp);cv+=(bgt-exp);csp+=exp;
    return{label:mlabel(mo),savings:inc-exp,variance:bgt-exp,spend:exp,cs,cv,csp};
  });

  const allBvaCats=[...new Set([...CATS,...Object.keys(budgets),...Object.keys(spcat)])];
  const bva=allBvaCats.filter(c=>bok((budgets[c]||{}).paidBy||"Both",person))
    .map((c,i)=>({name:c.length>13?c.slice(0,12)+"…":c,fullName:c,budget:(budgets[c]||{}).amount||0,actual:spcat[c]||0,paidBy:(budgets[c]||{}).paidBy||"Both",color:COLORS[i%COLORS.length]}))
    .filter(d=>d.budget>0||d.actual>0).sort((a,b)=>b.budget-a.budget);

  const fTxns=txns.filter(t=>gm(t.date)===month&&tok(t,person)).sort((a,b)=>b.date.localeCompare(a.date));
  const selLabel=new Date(month+"-01").toLocaleString("default",{month:"long",year:"numeric"});
  return{mTxns,income,expense,budgeted,variance,spcat,trend,bva,fTxns,selLabel,goals};
}

// ── Mini bar chart (pure SVG) ─────────────────────────────────────────────────
function miniChart(data, dataKey, colorFn, height){
  height=height||140;
  if(!data||!data.length)return div({});
  const vals=data.map(d=>d[dataKey]||0);
  const maxAbs=Math.max(...vals.map(Math.abs),1);
  const W=300,n=data.length,bw=Math.min(28,(W/n)*0.55),gap=W/n;
  const midY=height*0.58,scale=(midY-28)/maxAbs;
  const svgEl2=(tag,attrs,txt)=>{const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));if(txt!==undefined)el.textContent=txt;return el;};
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox","0 0 "+W+" "+height);
  s.setAttribute("width","100%");
  s.setAttribute("height",height);
  s.setAttribute("preserveAspectRatio","xMidYMid meet");
  // zero line
  s.appendChild(svgEl2("line",{x1:0,y1:midY,x2:W,y2:midY,stroke:"#e8eaf0","stroke-width":"1"}));
  data.forEach((d,i)=>{
    const val=d[dataKey]||0;
    const clr=colorFn?colorFn(val):(val>=0?"#16a34a":"#dc2626");
    const x=gap*i+gap/2-bw/2;
    const barH=Math.abs(val)*scale;
    const y=val>=0?midY-barH:midY;
    const rect=svgEl2("rect",{x,y,width:bw,height:Math.max(barH,1),fill:clr,rx:3});
    s.appendChild(rect);
    // label on top
    if(Math.abs(val)>0){
      const ly=val>=0?y-3:y+barH+10;
      // white bg rect for readability
      const tw = 28, th2 = 12;
      const tx2 = x+bw/2 - tw/2;
      const ty2 = val>=0 ? ly-11 : ly-1;
      const bg = svgEl2("rect",{x:tx2,y:ty2,width:tw,height:th2,fill:"white",rx:2,"fill-opacity":"0.85"});
      s.appendChild(bg);
      s.appendChild(svgEl2("text",{x:x+bw/2,y:ly,"text-anchor":"middle","font-size":"12","fill":clr,"font-weight":"700","font-family":"system-ui,sans-serif"},fmtS(val)));
    }
    // x label
    s.appendChild(svgEl2("text",{x:x+bw/2,y:height-2,"text-anchor":"middle","font-size":"11","fill":"#555","font-weight":"600","font-family":"system-ui,sans-serif"},d.label));
  });
  return div({style:{width:"100%",overflow:"hidden"}},s);
}

// ── BvA bar chart ─────────────────────────────────────────────────────────────
function bvaChart(data, height){
  height=height||220;
  if(!data||!data.length)return div({});
  const maxVal=Math.max(...data.map(d=>Math.max(d.budget,d.actual)),1);
  const W=700,n=data.length,grpW=(W-20)/n,bw=Math.min(12,grpW*0.22),labelH=55;
  const chartH=height-labelH;
  const scale=(chartH-20)/maxVal;
  const svgEl2=(tag,attrs,txt)=>{const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));if(txt!==undefined)el.textContent=txt;return el;};
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox","0 0 "+W+" "+height);
  s.setAttribute("width","100%");
  s.setAttribute("height",height);
  s.setAttribute("preserveAspectRatio","xMidYMid meet");
  data.forEach((d,i)=>{
    const cx=10+grpW*i+grpW/2;
    // budget bar
    const bh=Math.max(d.budget*scale,1);
    s.appendChild(svgEl2("rect",{x:cx-bw-1,y:chartH-bh,width:bw,height:bh,fill:"#93c5fd",rx:3}));
    // actual bar
    const ah=Math.max(d.actual*scale,1);
    s.appendChild(svgEl2("rect",{x:cx+1,y:chartH-ah,width:bw,height:ah,fill:"#e07b54",rx:3}));
    // x label
    const lx=cx;
    const labelEl=svgEl2("text",{x:lx,y:chartH+10,"text-anchor":"end","font-size":"8.5","fill":"#888","transform":"rotate(-40,"+lx+","+(chartH+10)+")"},d.name);
    s.appendChild(labelEl);
  });
  // legend
  const leg=div({style:{display:"flex",gap:16,justifyContent:"center",marginTop:4}});
  [["#93c5fd","Budget"],["#e07b54","Actual"]].forEach(([c,l])=>{
    leg.appendChild(div({style:{display:"flex",alignItems:"center",gap:4,fontSize:"10px",color:"#999"}},
      div({style:{width:"10px",height:"10px",borderRadius:"3px",background:c}}),
      l
    ));
  });
  const wrap=div({style:{width:"100%",overflowX:"auto"}});
  wrap.appendChild(s);
  wrap.appendChild(leg);
  return wrap;
}

// ── Filter bar ────────────────────────────────────────────────────────────────
function filterBar(){
  const {month,person}=state;
  const pLabel=person==="All"?"All expenses":person+" + shared";
  const bar=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}});
  const left=div({style:{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}});
  // month picker
  const mp=div({style:{display:"flex",alignItems:"center",gap:8}});
  mp.appendChild(span({style:{fontSize:"11px",color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}},"Month"));
  const mi=inp({type:"month",value:month,min:"2026-01",style:{background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:"10px",padding:"6px 12px",color:"#1a1a2e"}});
  mi.addEventListener('change',e=>setState({month:e.target.value}));
  mp.appendChild(mi);
  left.appendChild(mp);
  // person filter
  const pf=div({style:{display:"flex",gap:6,alignItems:"center"}});
  pf.appendChild(span({style:{fontSize:"11px",color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}},"View"));
  ["All","PS","SN"].forEach(f=>{
    const b=btn({className:"pill-btn"+(person===f?" active":""),onClick:()=>setState({person:f})},f);
    pf.appendChild(b);
  });
  left.appendChild(pf);
  left.appendChild(span({style:{fontSize:"12px",color:"#aaa",fontStyle:"italic"}},pLabel));
  bar.appendChild(left);
  bar.appendChild(span({style:{fontSize:"11px",color:"#8b5cf6",fontWeight:600,background:"#f5f3ff",padding:"4px 10px",borderRadius:"20px"}},"⬡ Preview"));
  return bar;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(c){
  const {income,expense,budgeted,variance,trend,bva,selLabel,goals}=c;
  const {month,person}=state;
  const wrap=div({style:{display:"grid",gap:16}});
  wrap.appendChild(filterBar());

  // summary cards
  const cards=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}});
  [{label:"Total Income",val:income,color:"#16a34a",icon:"↑"},
   {label:"Budgeted Expenses",val:budgeted,color:"#2563eb",icon:"◫"},
   {label:"Actual Expenses",val:expense,color:expense>budgeted?"#dc2626":"#e07b54",icon:"↓"}
  ].forEach(card=>{
    const el=div({className:"card",style:{padding:"20px 24px",display:"flex",alignItems:"center",gap:16}});
    el.appendChild(div({style:{width:"44px",height:"44px",borderRadius:"12px",background:card.color+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",color:card.color,flexShrink:0}},card.icon));
    const info=div({});
    info.appendChild(div({style:{fontSize:"10px",color:"#888",fontWeight:600,marginBottom:"3px",textTransform:"uppercase",letterSpacing:".06em"}},card.label+(person!=="All"?" · "+person:"")));
    info.appendChild(div({style:{fontFamily:"system-ui,sans-serif",fontWeight:700,fontSize:"20px",color:card.color}},fmt(card.val)));
    if(card.label==="Actual Expenses"&&budgeted>0){
      info.appendChild(div({style:{fontSize:"10px",color:variance>=0?"#16a34a":"#dc2626",marginTop:"2px",fontWeight:600}},
        variance>=0?"▲ "+fmt(variance)+" under budget":"▼ "+fmt(Math.abs(variance))+" over budget"
      ));
    }
    el.appendChild(info);
    cards.appendChild(el);
  });
  wrap.appendChild(cards);

  // trend charts
  const trendRow=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}});
  [{title:"Savings",dk:"savings",ck:"cs"},{title:"Budget vs Actuals",dk:"variance",ck:"cv"},{title:"Spending",dk:"spend",ck:"csp",bc:"#e07b54"}].forEach(tc=>{
    const cumVal=trend.length?trend[trend.length-1][tc.ck]:0;
    const cumC=tc.bc||(cumVal>=0?"#16a34a":"#dc2626");
    const card=div({className:"card",style:{padding:"18px 20px"}});
    const hdr=div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}});
    hdr.appendChild(div({},
      div({style:{fontWeight:700,fontSize:"13px",color:"#444"}},tc.title),
      div({style:{fontSize:"10px",color:"#aaa"}},"Jan 2026 – "+mlabel(month)+(person!=="All"?" · "+person:""))
    ));
    hdr.appendChild(div({style:{textAlign:"right"}},
      div({style:{fontFamily:"system-ui,sans-serif",fontWeight:700,fontSize:"15px",color:cumC}},fmtS(cumVal)),
      div({style:{fontSize:"9px",color:"#aaa"}},"cumulative")
    ));
    card.appendChild(hdr);
    card.appendChild(miniChart(trend,tc.dk,tc.bc?()=>tc.bc:null,140));
    trendRow.appendChild(card);
  });
  wrap.appendChild(trendRow);

  // BvA chart
  if(bva.length){
    const bvaCard=div({className:"card",style:{padding:"18px 22px"}});
    bvaCard.appendChild(div({style:{fontWeight:700,fontSize:"13px",color:"#444",marginBottom:"12px"}},"Budget vs Actuals — "+selLabel+(person!=="All"?" · "+person:"")));
    bvaCard.appendChild(bvaChart(bva,250));
    wrap.appendChild(bvaCard);
  }

  // BvA table
  if(bva.length){
    const tCard=div({className:"card",style:{overflowX:"auto"}});
    tCard.appendChild(div({style:{padding:"16px 18px 0",fontWeight:700,fontSize:"13px",color:"#444",marginBottom:"2px"}},"Budget vs Actuals — Detail · "+selLabel+(person!=="All"?" · "+person:"")));
    const tbl=h("table",{});
    const thead=h("thead",{});
    const headRow=h("tr",{style:{borderBottom:"2px solid #eef0f5"}});
    ["Category","Paid By","Budget","Actual","Variance","Status"].forEach((hd,i)=>{
      headRow.appendChild(h("th",{style:{padding:"9px 14px",textAlign:i>=2&&i<=4?"right":"left",fontSize:"10px",color:"#aaa",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",whiteSpace:"nowrap"}},hd));
    });
    thead.appendChild(headRow);
    tbl.appendChild(thead);
    const tbody=h("tbody",{});
    bva.forEach(d=>{
      const dv=d.budget-d.actual,pct=d.budget>0?Math.min((d.actual/d.budget)*100,100):0,over=d.budget>0&&d.actual>d.budget;
      const row=h("tr",{style:{borderBottom:"1px solid #f5f5f8"}});
      row.appendChild(h("td",{style:{padding:"10px 14px",verticalAlign:"middle"}},
        div({style:{display:"flex",alignItems:"center",gap:"8px"}},
          div({style:{width:"4px",height:"16px",borderRadius:"2px",background:d.color,flexShrink:0}}),
          span({style:{fontWeight:500,color:"#333",fontSize:"13px"}},d.fullName)
        )
      ));
      row.appendChild(h("td",{style:{padding:"10px 14px"}},span({className:"tag",style:{background:SBC[d.paidBy]+"14",color:SBC[d.paidBy]}},d.paidBy)));
      row.appendChild(h("td",{style:{padding:"10px 14px",textAlign:"right",fontFamily:"system-ui,sans-serif",fontWeight:700,color:"#2563eb",fontSize:"13px"}},d.budget>0?fmt(d.budget):"—"));
      row.appendChild(h("td",{style:{padding:"10px 14px",textAlign:"right",fontFamily:"system-ui,sans-serif",fontWeight:700,color:d.actual>0?"#e07b54":"#ccc",fontSize:"13px"}},d.actual>0?fmt(d.actual):"—"));
      row.appendChild(h("td",{style:{padding:"10px 14px",textAlign:"right",fontFamily:"system-ui,sans-serif",fontWeight:700,color:d.budget>0?(dv>=0?"#16a34a":"#dc2626"):"#ccc",fontSize:"13px"}},d.budget>0?(dv>=0?"+"+fmt(dv):fmt(dv)):"—"));
      const statusTd=h("td",{style:{padding:"10px 14px",minWidth:"130px"}});
      if(d.budget>0){
        const pb=div({className:"progress-bar",style:{marginBottom:"3px"}});
        pb.appendChild(div({className:"progress-fill",style:{width:pct+"%",background:over?"#dc2626":d.color}}));
        statusTd.appendChild(pb);
        statusTd.appendChild(span({style:{fontSize:"10px",color:over?"#dc2626":"#16a34a",fontWeight:600}},over?"⚠ "+pct.toFixed(0)+"% (over)":pct.toFixed(0)+"% used"));
      } else {
        statusTd.appendChild(span({style:{fontSize:"10px",color:"#dc2626"}},"⚠ No budget"));
      }
      row.appendChild(statusTd);
      tbody.appendChild(row);
    });
    // total row
    const tot=h("tr",{style:{borderTop:"2px solid #e8eaf0",background:"#f8f9fb"}});
    [["Total","",2],["",fmt(budgeted),"right","#2563eb"],[fmt(expense),"right","#e07b54"],[(variance>=0?"+":"")+fmt(variance),"right",variance>=0?"#16a34a":"#dc2626"],[""]].forEach((td,i)=>{
      if(i===0){tot.appendChild(h("td",{colSpan:2,style:{padding:"11px 14px",fontWeight:700,color:"#333",fontSize:"13px"}},"Total"));}
      else if(i===1){tot.appendChild(h("td",{style:{padding:"11px 14px",textAlign:"right",fontFamily:"system-ui,sans-serif",fontWeight:700,color:"#2563eb"}},fmt(budgeted)));}

// ── Budgets ───────────────────────────────────────────────────────────────────
function renderBudgets(c){
  const {spcat}=c;
  const {budgets}=state;
  // Get all cats from budgets (includes custom ones added by user)
  const allCats = [...new Set([...CATS, ...Object.keys(budgets)])];
  const wrap=div({style:{display:"grid",gap:14}});

  // Header with Add Category button
  const header=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}});
  header.appendChild(div({style:{fontSize:"13px",color:"#aaa"}},"Set monthly budgets and assign responsibility per category."));
  const addCatBtn=btn({style:{background:"#e07b54",color:"#fff",borderRadius:"10px",padding:"9px 18px",fontSize:"13px",fontWeight:600}},"+ Add Category");
  addCatBtn.addEventListener('click',()=>setState({showBudgetModal:true,editBudgetCat:null}));
  header.appendChild(addCatBtn);
  wrap.appendChild(header);

  const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}});
  allCats.forEach((cat,i)=>{
    const b=budgets[cat]||{amount:0,paidBy:"Both"},bgt=b.amount,pb=b.paidBy;
    const sp=spcat[cat]||0,pct=bgt>0?Math.min((sp/bgt)*100,100):0,over=bgt>0&&sp>bgt;
    const colorIdx = i % COLORS.length;
    const card=div({className:"card",style:{padding:"13px 16px"}});
    const top=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:bgt>0?"9px":"0"}});
    const nameDiv=div({style:{display:"flex",alignItems:"center",gap:"8px"}},
      div({style:{width:"4px",height:"18px",borderRadius:"2px",background:COLORS[colorIdx]}}),
      span({style:{fontWeight:600,fontSize:"13px",color:"#333"}},cat)
    );
    top.appendChild(nameDiv);
    const controls=div({style:{display:"flex",alignItems:"center",gap:"7px"}});

    // Edit/delete buttons
    const actionBtns=div({style:{display:"flex",gap:"2px"}});
    const editBtn=btn({style:{background:"transparent",border:"none",borderRadius:"7px",padding:"4px 7px",fontSize:"12px",color:"#999",cursor:"pointer"}},"✎");
    editBtn.addEventListener('click',()=>setState({showBudgetModal:true,editBudgetCat:cat}));
    const delBtn=btn({style:{background:"transparent",border:"none",borderRadius:"7px",padding:"4px 7px",fontSize:"12px",color:"#e07b54",cursor:"pointer"}},"✕");
    delBtn.addEventListener('click',()=>{
      if(!confirm("Remove "+cat+" from budgets?")) return;
      const nb={...state.budgets}; delete nb[cat];
      setState({budgets:nb});
      dbDelBudgetCat(cat);
    });
    actionBtns.appendChild(editBtn); actionBtns.appendChild(delBtn);
    controls.appendChild(actionBtns);

    const sbBtns=div({style:{display:"flex",gap:"3px"}});
    SBY.forEach(s=>{
      const sb2=btn({style:{padding:"3px 8px",borderRadius:"20px",fontSize:"11px",fontWeight:700,border:"1px solid "+(pb===s?SBC[s]:"#dde0e8"),background:pb===s?SBC[s]+"12":"transparent",color:pb===s?SBC[s]:"#ccc"}},s);
      sb2.addEventListener('click',()=>{
        const nb={...state.budgets[cat],paidBy:s};
        setState(st=>({budgets:{...st.budgets,[cat]:nb}})); dbUpdBudget(cat,nb);
      });
      sbBtns.appendChild(sb2);
    });
    controls.appendChild(sbBtns);
    const amtDiv=div({style:{display:"flex",alignItems:"center",gap:"3px"}},span({style:{fontSize:"12px",color:"#aaa"}},"₹"));
    const amtInp=inp({type:"number",value:bgt||"",placeholder:"0",style:{width:"90px",textAlign:"right",padding:"6px 8px",background:"#f8f9fb",border:"1px solid #dde0e8",borderRadius:"10px",color:"#1a1a2e"}});
    amtInp.addEventListener('change',e=>{
      const nb={...state.budgets[cat],amount:parseFloat(e.target.value)||0};
      setState(st=>({budgets:{...st.budgets,[cat]:nb}})); dbUpdBudget(cat,nb);
    });
    amtDiv.appendChild(amtInp);
    controls.appendChild(amtDiv);
    top.appendChild(controls);
    card.appendChild(top);
    if(bgt>0){
      const pb2=div({className:"progress-bar",style:{marginBottom:"4px"}});
      pb2.appendChild(div({className:"progress-fill",style:{width:pct+"%",background:over?"#dc2626":COLORS[colorIdx]}}));
      card.appendChild(pb2);
      const lbl=div({style:{display:"flex",justifyContent:"space-between",fontSize:"11px"}});
      lbl.appendChild(span({style:{color:"#aaa"}},"Spent: "));
      lbl.querySelector('span').appendChild(h("strong",{style:{color:over?"#dc2626":"#333"}},fmt(sp)));
      const lbl2=span({style:{color:"#aaa"}},"Left: ");
      lbl2.appendChild(h("strong",{style:{color:over?"#dc2626":"#16a34a"}},fmt(Math.max(bgt-sp,0))));
      lbl.appendChild(lbl2);
      card.appendChild(lbl);
      if(over)card.appendChild(div({style:{marginTop:"4px",fontSize:"11px",color:"#dc2626"}},"⚠ Over by "+fmt(sp-bgt)));
    }
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

    i.addEventListener('input',e=>{Object.assign(txnForm,{[key]:e.target.value});});

    b.addEventListener('click',()=>{Object.assign(txnForm,{spentBy:s});setState({txnForm:{...txnForm}});});
    sbyBtns.appendChild(b);
  });
  sbyRow.appendChild(sbyBtns);

  // buttons
  const btns=div({style:{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"4px"}});

  const save=btn({style:{background:"#e07b54",color:"#fff",borderRadius:"10px",padding:"10px 20px",fontSize:"14px",fontWeight:600}},editTxnId?"Save Changes":"Add Transaction");

// ── Load Supabase via dynamic import (avoids CDN race conditions) ─────────────
let sb = null;
async function loadSupabase() {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload = () => { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); resolve(); };
    s.onerror = () => reject(new Error('Supabase CDN failed'));
    document.head.appendChild(s);
  });
}

// ── Realtime subscriptions ────────────────────────────────────────────────────
function startRealtime() {
  sb.channel('rt-txns').on('postgres_changes', {event:'*',schema:'public',table:'transactions'}, p => {
    if (p.eventType==='INSERT') { if(!state.txns.find(t=>t.id===p.new.id)) { state.txns=[r2t(p.new),...state.txns]; render(); } }
    else if (p.eventType==='UPDATE') { state.txns=state.txns.map(t=>t.id===p.new.id?r2t(p.new):t); render(); }
    else if (p.eventType==='DELETE') { state.txns=state.txns.filter(t=>t.id!==p.old.id); render(); }
  }).subscribe();
  sb.channel('rt-buds').on('postgres_changes', {event:'*',schema:'public',table:'budgets'}, p => {
    if (p.new) { state.budgets={...state.budgets,[p.new.category]:{amount:Number(p.new.amount),paidBy:p.new.paid_by}}; render(); }
  }).subscribe();
  sb.channel('rt-goals').on('postgres_changes', {event:'*',schema:'public',table:'goals'}, p => {
    const g = p.new ? {id:p.new.id,name:p.new.name,target:Number(p.new.target),saved:Number(p.new.saved)} : null;
    if (p.eventType==='INSERT' && !state.goals.find(x=>x.id===g.id)) { state.goals=[...state.goals,g]; render(); }
    else if (p.eventType==='UPDATE') { state.goals=state.goals.map(x=>x.id===g.id?g:x); render(); }
    else if (p.eventType==='DELETE') { state.goals=state.goals.filter(x=>x.id!==p.old.id); render(); }
  }).subscribe();
  sb.channel('rt-mbuds').on('postgres_changes', {event:'*',schema:'public',table:'monthly_budgets'}, p => {
    if (p.new) {
      const mb = {...state.monthlyBudgets};
      if (!mb[p.new.month]) mb[p.new.month] = {};
      mb[p.new.month][p.new.category] = {amount: Number(p.new.amount), paidBy: p.new.paid_by};
      state.monthlyBudgets = mb;
      render();
    }
  }).subscribe();
}

function r2t(r) { return {id:r.id,date:r.date,type:r.type,category:r.category,amount:Number(r.amount),description:r.description||'',spentBy:r.spent_by}; }
function t2r(t) { return {id:t.id,date:t.date,type:t.type,category:t.category,amount:t.amount,description:t.description||'',spent_by:t.spentBy}; }

// ── Archive current budget to monthly_budgets if not yet saved for a month ──
async function archiveBudgetForMonth(month) {
  const {data} = await sb.from('monthly_budgets').select('category').eq('month', month).limit(1);
  if (data && data.length > 0) return; // already archived
  const rows = Object.entries(state.budgets).map(([cat, b]) => ({
    month, category: cat, amount: b.amount, paid_by: b.paidBy
  }));
  if (rows.length > 0) await sb.from('monthly_budgets').upsert(rows, {onConflict: 'month,category'});
}

// ── Load monthly_budgets into state ─────────────────────────────────────────
function buildMonthlyBudgetsMap(rows) {
  const map = {};
  (rows||[]).forEach(r => {
    if (!map[r.month]) map[r.month] = {};
    map[r.month][r.category] = {amount: Number(r.amount), paidBy: r.paid_by};
  });
  return map;
}

// ── Get budget for a specific month (use archived if exists, else current) ───
function budgetForMonth(month) {
  if (state.monthlyBudgets[month]) return state.monthlyBudgets[month];
  return state.budgets; // fall back to current budget
}

async function loadData() {
  try {
    const [tr,br,gr] = await Promise.all([
      sb.from('transactions').select('*').order('date',{ascending:false}),
      sb.from('budgets').select('*'),
      sb.from('goals').select('*').order('created_at',{ascending:true}),
    ]);
    if (tr.error) { alert('Transactions error: ' + tr.error.message); return; }
    if (br.error) { alert('Budgets error: ' + br.error.message); return; }
    if (gr.error) { alert('Goals error: ' + gr.error.message); return; }
    state.txns = (tr.data||[]).map(r2t);
    if (br.data && br.data.length > 0) {
      const bm = {...defBudgets};
      br.data.forEach(r => { bm[r.category]={amount:Number(r.amount),paidBy:r.paid_by}; });
      state.budgets = bm;
    } else {
      await sb.from('budgets').insert(CATS.map(c=>({category:c,amount:BUDGETS[c]||0,paid_by:DEFPAIDBY[c]||'Both'})));
    }
    state.goals = (gr.data||[]).map(r=>({id:r.id,name:r.name,target:Number(r.target),saved:Number(r.saved)}));
    // Load monthly_budgets separately so it doesn't break core load if table missing
    try {
      const mbr = await sb.from('monthly_budgets').select('*');
      if (!mbr.error) {
        state.monthlyBudgets = buildMonthlyBudgetsMap(mbr.data);
        const curMonth = new Date().toISOString().slice(0,7);
        await archiveBudgetForMonth(curMonth);
      }
    } catch(e) { console.warn('monthly_budgets not available yet:', e); }
    state.loading = false;
    state.dbStatus = 'connected: ' + tr.data.length + ' txns loaded';
    render();
    startRealtime();
  } catch(err) {
    console.error('Load error:', err);
    state.loading = false;
    render();
  }
}

// ── CRUD wired to Supabase ────────────────────────────────────────────────────
async function dbAddTxn(t) {
  if (!sb) { alert('Not connected to database. Please refresh and log in again.'); return; }
  const row = t2r(t);
  console.log('Saving row:', JSON.stringify(row));
  const {data, error} = await sb.from('transactions').insert(row).select();
  if(error) {
    alert('Save failed:\nCode: ' + error.code + '\nMessage: ' + error.message + '\nDetails: ' + error.details + '\nHint: ' + error.hint);
  } else {
    console.log('Saved ok:', JSON.stringify(data));
    alert('Saved! Row id: ' + (data&&data[0]?data[0].id:'unknown'));
  }
}
async function dbUpdTxn(t) { const{error}=await sb.from('transactions').update(t2r(t)).eq('id',t.id); if(error) console.error(error); }
async function dbDelTxn(id) { const{error}=await sb.from('transactions').delete().eq('id',id); if(error) console.error(error); }
async function dbUpdBudget(cat,nb) {
  await sb.from('budgets').upsert({category:cat,amount:nb.amount,paid_by:nb.paidBy},{onConflict:'category'});
  // Also update current month's archive
  const curMonth = new Date().toISOString().slice(0,7);
  await sb.from('monthly_budgets').upsert({month:curMonth,category:cat,amount:nb.amount,paid_by:nb.paidBy},{onConflict:'month,category'});
  // Update local monthlyBudgets state
  const mb = {...state.monthlyBudgets};
  if (!mb[curMonth]) mb[curMonth] = {};
  mb[curMonth][cat] = {amount:nb.amount, paidBy:nb.paidBy};
  state.monthlyBudgets = mb;
}
async function dbAddBudgetCat(cat, amount, paidBy) {
  await sb.from('budgets').upsert({category:cat,amount,paid_by:paidBy},{onConflict:'category'});
  const curMonth = new Date().toISOString().slice(0,7);
  await sb.from('monthly_budgets').upsert({month:curMonth,category:cat,amount,paid_by:paidBy},{onConflict:'month,category'});
  const mb = {...state.monthlyBudgets};
  if (!mb[curMonth]) mb[curMonth] = {};
  mb[curMonth][cat] = {amount, paidBy};
  state.monthlyBudgets = mb;
}
async function dbDelBudgetCat(cat) {
  await sb.from('budgets').delete().eq('category',cat);
  // Keep historical monthly_budgets intact for past months
}
async function dbAddGoal(g) { await sb.from('goals').insert({id:g.id,name:g.name,target:g.target,saved:g.saved}); }
async function dbUpdGoal(g) { await sb.from('goals').update({name:g.name,target:g.target,saved:g.saved}).eq('id',g.id); }
async function dbDelGoal(id) { await sb.from('goals').delete().eq('id',id); }

async function init() {
  if (!state.authed) { state.loading=false; render(); return; }
  render(); // show loading spinner
  try {
    await loadSupabase();
    await loadData();
  } catch(err) {
    console.error('Init error:', err);
    state.loading = false;
    render();
  }
}
